<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BrainBot Kategorisierung</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #111; color: #f5f5f5; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; opacity: .85; }
    input, select, button { min-height: 40px; border-radius: 10px; border: 1px solid #2c3138; background: #161a1f; color: #f5f5f5; padding: 0 10px; }
    button { cursor: pointer; font-weight: 700; }
    .primary { background: #2a7fff; border-color: #2a7fff; }
    .status { padding: 10px; border-radius: 10px; background: #1d1d1d; margin-bottom: 12px; font-size: 14px; }
    .cards { display: grid; grid-template-columns: repeat(4, minmax(120px, 1fr)); gap: 10px; margin: 12px 0; }
    .card { border: 1px solid #2c3138; border-radius: 10px; padding: 10px; background: #161a1f; }
    .card .num { font-size: 22px; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border-bottom: 1px solid #2c3138; text-align: left; padding: 8px 6px; font-size: 13px; }
    .section { border: 1px solid #2c3138; border-radius: 12px; padding: 12px; margin-top: 14px; background: #14181d; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>📊 BrainBot Kategorisierung</h2>
    <div id="status" class="status">Status: initialisiere...</div>

    <div class="toolbar">
      <div class="field">
        <label for="roomName">Zimmername</label>
        <input id="roomName" value="Laborraum_A" />
      </div>
      <div class="field">
        <label for="roomWidth">Breite (cm)</label>
        <input id="roomWidth" type="number" min="1" value="500" />
      </div>
      <div class="field">
        <label for="roomHeight">Höhe (cm)</label>
        <input id="roomHeight" type="number" min="1" value="400" />
      </div>
      <div class="field">
        <label for="period">Blockansicht</label>
        <select id="period">
          <option value="day">Tag</option>
          <option value="week">Woche</option>
          <option value="month" selected>Monat</option>
          <option value="year">Jahr</option>
        </select>
      </div>
      <div class="field" style="justify-content: flex-end;">
        <label>&nbsp;</label>
        <button id="refreshBtn" class="primary">AKTUALISIEREN</button>
      </div>
      <div class="field" style="justify-content: flex-end;">
        <label>&nbsp;</label>
        <button id="exportBtn">JPG EXPORT</button>
      </div>
    </div>

    <div class="cards">
      <div class="card"><div>Gesamt</div><div id="totalAll" class="num">0</div></div>
      <div class="card"><div>OBSTACLE</div><div id="totalObstacle" class="num">0</div></div>
      <div class="card"><div>CLEAR</div><div id="totalClear" class="num">0</div></div>
      <div class="card"><div>OTHER</div><div id="totalOther" class="num">0</div></div>
    </div>

    <div class="section">
      <h3>Blockübersicht</h3>
      <div id="createdAt">Erstellt am: -</div>
      <table>
        <thead>
          <tr><th>Block</th><th>Gesamt</th><th>OBSTACLE</th><th>CLEAR</th><th>OTHER</th></tr>
        </thead>
        <tbody id="blocksBody"></tbody>
      </table>
    </div>

    <div class="section">
      <h3>Letzte Kategorisierungen</h3>
      <table>
        <thead>
          <tr><th>Erstellt am</th><th>Zimmer</th><th>Distanz</th><th>Grenze</th><th>Kategorie</th><th>Kommando</th></tr>
        </thead>
        <tbody id="recentBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const blocksBody = document.getElementById('blocksBody');
    const recentBody = document.getElementById('recentBody');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function call(path, method = 'GET', body = null) {
      const init = { method, headers: { 'Content-Type': 'application/json' } };
      if (body !== null) {
        init.body = JSON.stringify(body);
      }
      const response = await fetch(path, init);
      return await response.json();
    }

    function renderSummary(data) {
      document.getElementById('createdAt').textContent = `Erstellt am: ${data.created_at || '-'}`;
      document.getElementById('totalAll').textContent = data.totals?.total ?? 0;
      document.getElementById('totalObstacle').textContent = data.totals?.OBSTACLE ?? 0;
      document.getElementById('totalClear').textContent = data.totals?.CLEAR ?? 0;
      document.getElementById('totalOther').textContent = data.totals?.OTHER ?? 0;

      const period = document.getElementById('period').value;
      const blocks = data.blocks?.[period] || [];
      blocksBody.innerHTML = '';
      for (const item of blocks.slice(0, 24)) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${item.block}</td><td>${item.total}</td><td>${item.OBSTACLE}</td><td>${item.CLEAR}</td><td>${item.OTHER}</td>`;
        blocksBody.appendChild(tr);
      }

      recentBody.innerHTML = '';
      for (const entry of (data.recent || []).slice(0, 40)) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${entry.created_at || ''}</td>
          <td>${entry.room_name || '-'}</td>
          <td>${entry.distance_cm ?? ''}</td>
          <td>${entry.safe_distance_cm ?? ''}</td>
          <td>${entry.decision || ''}</td>
          <td>${entry.command || ''}</td>
        `;
        recentBody.appendChild(tr);
      }

      setStatus(`Status: Quelle=${data.source} | Einträge=${data.totals?.total ?? 0}`);
    }

    async function refresh() {
      try {
        const data = await call('/api/summary?limit=2000');
        if (!data.ok) {
          setStatus(`Status: Fehler: ${data.message || 'unbekannt'}`);
          return;
        }
        renderSummary(data);
      } catch {
        setStatus('Status: API nicht erreichbar');
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', refresh);
    document.getElementById('period').addEventListener('change', refresh);

    document.getElementById('exportBtn').addEventListener('click', async () => {
      const room_name = document.getElementById('roomName').value.trim() || 'Unbekanntes_Zimmer';
      const room_width_cm = Number(document.getElementById('roomWidth').value);
      const room_height_cm = Number(document.getElementById('roomHeight').value);
      const period = document.getElementById('period').value;

      try {
        const data = await call('/api/export-jpg', 'POST', {
          room_name,
          room_width_cm,
          room_height_cm,
          period,
        });
        if (data.ok) {
          setStatus(`Status: ${data.message}`);
        } else {
          setStatus(`Status: Export fehlgeschlagen: ${data.message}`);
        }
      } catch {
        setStatus('Status: Export-API nicht erreichbar');
      }
    });

    refresh();
  </script>
</body>
</html>
