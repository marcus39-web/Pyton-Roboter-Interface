# pytest.ini - Konfigurationsdatei für pytest
# ============================================
#
# Diese Datei konfiguriert das pytest Testing-Framework für das BrainBot AI Projekt.
# pytest liest diese Datei automatisch beim Start und wendet die Einstellungen an.
#
# Autor: Marcus Weber
# Datum: 2026-03-02
# Version: 1.0.0
#
# Dokumentation: https://docs.pytest.org/en/stable/reference/customize.html

[pytest]
#TestPaths - Definiert die Verzeichnisse, in denen pytest nach Tests sucht
# -------------------------------------------------------------------------
# Wert: tests
# Bedeutung: pytest durchsucht nur das 'tests/' Verzeichnis nach Test-Dateien
# Vorteil: Schnellere Test-Ausführung, da andere Verzeichnisse ignoriert werden
testpaths = tests

# Python Files - Definiert das Namensmuster für Test-Dateien
# -----------------------------------------------------------
# Wert: test_*.py
# Bedeutung: Nur Dateien, die mit 'test_' beginnen, werden als Tests erkannt
# Beispiele:
#   - test_basis_class.py   ✓ wird gefunden
#   - test_robot.py         ✓ wird gefunden
#   - basis_class.py        ✗ wird ignoriert
#   - helpers.py            ✗ wird ignoriert
python_files = test_*.py

# Python Classes - Definiert das Namensmuster für Test-Klassen
# -------------------------------------------------------------
# Wert: Test*
# Bedeutung: Nur Klassen, die mit 'Test' beginnen, werden als Test-Klassen erkannt
# Beispiele:
#   - class TestBrainBotRemote:    ✓ wird erkannt
#   - class TestConnection:        ✓ wird erkannt
#   - class BrainBotRemote:        ✗ wird ignoriert
#   - class Helper:                ✗ wird ignoriert
python_classes = Test*

# Python Functions - Definiert das Namensmuster für Test-Funktionen
# ------------------------------------------------------------------
# Wert: test_*
# Bedeutung: Nur Funktionen, die mit 'test_' beginnen, werden als Tests erkannt
# Beispiele:
#   - def test_connect():          ✓ wird erkannt
#   - def test_send_command():     ✓ wird erkannt
#   - def connect():               ✗ wird ignoriert
#   - def helper_function():       ✗ wird ignoriert
python_functions = test_*

# AddOpts - Zusätzliche Kommandozeilen-Optionen für pytest
# ---------------------------------------------------------
# Diese Optionen werden bei jedem pytest-Aufruf automatisch hinzugefügt
#
# -v (--verbose)
#   Aktiviert den verbose (ausführlichen) Modus
#   Zeigt jeden einzelnen Test mit Namen und Status an
#   Beispiel-Ausgabe:
#     tests/test_basis_class.py::TestBrainBotRemote::test_connect PASSED [ 25%]
#
# --tb=short
#   Konfiguriert das Traceback-Format bei Fehlern
#   'short' zeigt nur die relevantesten Zeilen an (kompakter)
#   Alternativen:
#     - auto   = Standard-Format
#     - long   = Vollständiger Traceback
#     - line   = Nur eine Zeile pro Fehler
#     - native = Python-Standard-Traceback
#     - no     = Kein Traceback
#
# Weitere nützliche Optionen (können manuell ergänzt werden):
#   - --cov=basis_class              = Coverage für basis_class.py messen
#   - --cov-report=html              = HTML-Coverage-Report erstellen
#   - --cov-report=term-missing      = Fehlende Zeilen in Console anzeigen
#   - -x                             = Bei erstem Fehler stoppen
#   - --maxfail=N                    = Nach N Fehlern stoppen
#   - -k EXPRESSION                  = Nur Tests ausführen, die EXPRESSION matchen
#   - --markers                      = Alle verfügbaren Marker anzeigen
addopts = -v --tb=short

# Beispiel-Aufrufe
# ----------------
# Alle Tests ausführen:
#   pytest
#
# Mit Coverage:
#   pytest --cov=basis_class --cov-report=term-missing
#
# Nur einen bestimmten Test:
#   pytest tests/test_basis_class.py::TestBrainBotRemote::test_connect
#
# Nur Tests, die "connect" im Namen haben:
#   pytest -k connect
#
# HTML-Coverage-Report erstellen:
#   pytest --cov=basis_class --cov-report=html
#   # Report öffnen: htmlcov/index.html
#
# Bei erstem Fehler stoppen:
#   pytest -x
#
# Alle verfügbaren Fixtures anzeigen:
#   pytest --fixtures