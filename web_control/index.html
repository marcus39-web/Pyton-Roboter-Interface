<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BrainBot Steuerung</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #111; color: #f5f5f5; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 16px; }
    .row { display: flex; gap: 10px; margin-bottom: 10px; }
    button { flex: 1; min-height: 64px; border: 0; border-radius: 12px; font-size: 18px; font-weight: 700; touch-action: manipulation; user-select: none; -webkit-user-select: none; }
    .primary { background: #2a7fff; color: #fff; }
    .danger { background: #d32f2f; color: #fff; }
    .muted { background: #2e2e2e; color: #fff; }
    .status { margin: 10px 0 16px; padding: 10px; border-radius: 10px; background: #1d1d1d; font-size: 14px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .empty { visibility: hidden; }
    .hint { font-size: 13px; opacity: .85; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>🤖 BrainBot Steuerung</h2>
    <div id="status" class="status">Status: nicht verbunden</div>

    <div class="row">
      <button class="primary" id="connectBtn">START</button>
      <button class="muted" id="disconnectBtn">DISCONNECT</button>
      <button class="danger" id="stopBtn">STOP</button>
    </div>

    <div class="grid">
      <button class="empty">.</button>
      <button class="primary cmd" data-cmd="FORWARD">VOR</button>
      <button class="empty">.</button>

      <button class="primary cmd" data-cmd="TURN_LEFT_90">LINKS</button>
      <button class="muted cmd" data-cmd="STOP">HALT</button>
      <button class="primary cmd" data-cmd="TURN_RIGHT_90">RECHTS</button>

      <button class="empty">.</button>
      <button class="primary cmd" data-cmd="BACKWARD">ZURÜCK</button>
      <button class="empty">.</button>
    </div>

    <p class="hint">
      Hold-Steuerung: Gedrückt halten = Bewegung, Loslassen = STOP. Tastatur: W/A/S/D, E, Leertaste, Q.
    </p>
  </div>

  <script>
    // Statusanzeige für Rückmeldungen aus der API.
    const statusEl = document.getElementById('status');
    let isConnected = false;
    let emergencyInProgress = false;

    // Gemeinsamer API-Aufruf für alle Steueraktionen.
    async function call(path, body) {
      try {
        const res = await fetch(path, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body || {})
        });
        return await res.json();
      } catch {
        return { ok: false, message: 'Netzwerkfehler zur Steuer-API', connected: false };
      }
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    // Gateway-Status zentral aus API-Antworten übernehmen.
    function syncConnectionState(data) {
      if (typeof data?.connected === 'boolean') {
        isConnected = data.connected;
      }
    }

    async function connect() {
      const data = await call('/api/connect');
      syncConnectionState(data);
      setStatus(`Status: ${data.message}`);
    }

    async function disconnect() {
      const data = await call('/api/disconnect');
      syncConnectionState(data);
      setStatus(`Status: ${data.message}`);
    }

    async function sendCommand(command, useEmergencyOnFail = true) {
      const data = await call('/api/command', { command });
      syncConnectionState(data);
      setStatus(`Status: ${data.message}`);

      // Fallback-Sicherheit: Bei Fehlern sofort Not-Aus auslösen.
      if (!data.ok && useEmergencyOnFail && isConnected) {
        await emergencyStop('command_failed');
      }

      return data;
    }

    async function emergencyStop(reason = 'manual') {
      if (emergencyInProgress) {
        return;
      }
      emergencyInProgress = true;

      // Laufende Hold-Bewegung lokal sofort beenden.
      stopHoldCommand(false);

      const data = await call('/api/emergency-stop', { reason });
      syncConnectionState(data);
      setStatus(`Status: ${data.message}`);

      emergencyInProgress = false;
    }

    // Wiederholtes Senden hält die Bewegung stabil aktiv, bis losgelassen wird.
    const repeatIntervalMs = 700;
    let activeHoldCommand = null;
    let holdTimer = null;

    function startHoldCommand(command) {
      if (activeHoldCommand === command) {
        return;
      }

      stopHoldCommand(false);
      activeHoldCommand = command;
      sendCommand(command);

      holdTimer = window.setInterval(() => {
        if (activeHoldCommand === command) {
          sendCommand(command);
        }
      }, repeatIntervalMs);
    }

    function stopHoldCommand(sendStop = true) {
      if (!activeHoldCommand) {
        return;
      }

      activeHoldCommand = null;
      if (holdTimer !== null) {
        window.clearInterval(holdTimer);
        holdTimer = null;
      }

      // Sicherheitsverhalten: Beim Loslassen immer STOP.
      if (sendStop) {
        sendCommand('STOP', false);
      }
    }

    // Primäre Steuer-Buttons (Touch + Maus).
    document.getElementById('connectBtn').addEventListener('click', connect);
    document.getElementById('disconnectBtn').addEventListener('click', disconnect);
    document.getElementById('stopBtn').addEventListener('click', () => {
      emergencyStop('stop_button');
    });

    document.querySelectorAll('.cmd').forEach(btn => {
      const command = btn.dataset.cmd;

      // STOP/HALT bleibt ein einfacher Klick.
      if (command === 'STOP') {
        btn.addEventListener('click', () => {
          emergencyStop('halt_button');
        });
        return;
      }

      // Pointer-Events decken Maus + Touch ab (iPhone/Android/Desktop).
      btn.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        startHoldCommand(command);
      });
      btn.addEventListener('pointerup', () => stopHoldCommand(true));
      btn.addEventListener('pointercancel', () => stopHoldCommand(true));
      btn.addEventListener('pointerleave', () => stopHoldCommand(true));
    });

    // Tastatur-Mapping für Desktop-Steuerung.
    const holdKeyMap = {
      'w': 'FORWARD',
      'a': 'TURN_LEFT_90',
      's': 'BACKWARD',
      'd': 'TURN_RIGHT_90'
    };

    // Start/Disconnect auf E/Q, Bewegungen als Hold auf W/A/S/D.
    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();
      if (key === 'e') {
        event.preventDefault();
        stopHoldCommand(false);
        connect();
        return;
      }
      if (key === 'q') {
        event.preventDefault();
        stopHoldCommand(false);
        disconnect();
        return;
      }
      if (key === ' ') {
        event.preventDefault();
        emergencyStop('keyboard_space');
        return;
      }

      const cmd = holdKeyMap[key];
      if (!cmd) return;
      event.preventDefault();
      if (!event.repeat) {
        startHoldCommand(cmd);
      }
    });

    // Bei Taste loslassen wird die Bewegung sicher beendet.
    window.addEventListener('keyup', (event) => {
      const key = event.key.toLowerCase();
      if (holdKeyMap[key]) {
        event.preventDefault();
        stopHoldCommand(true);
      }
    });

    // Sicherheitsnetz, falls Tab/Fenster den Fokus verliert.
    window.addEventListener('blur', () => {
      if (isConnected) {
        emergencyStop('window_blur');
      }
    });

    // iPhone/Browser-Wechsel absichern: Beim Verlassen oder Ausblenden Not-Aus.
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && isConnected) {
        emergencyStop('visibility_hidden');
      }
    });

    window.addEventListener('beforeunload', () => {
      if (isConnected) {
        emergencyStop('before_unload');
      }
    });
  </script>
</body>
</html>
