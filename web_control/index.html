<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BrainBot Steuerung</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #111; color: #f5f5f5; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 16px; }
    .row { display: flex; gap: 10px; margin-bottom: 10px; }
    button { flex: 1; min-height: 64px; border: 0; border-radius: 12px; font-size: 18px; font-weight: 700; }
    .primary { background: #2a7fff; color: #fff; }
    .danger { background: #d32f2f; color: #fff; }
    .muted { background: #2e2e2e; color: #fff; }
    .status { margin: 10px 0 16px; padding: 10px; border-radius: 10px; background: #1d1d1d; font-size: 14px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .empty { visibility: hidden; }
    .hint { font-size: 13px; opacity: .85; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>🤖 BrainBot Steuerung</h2>
    <div id="status" class="status">Status: nicht verbunden</div>

    <div class="row">
      <button class="primary" id="connectBtn">START</button>
      <button class="muted" id="disconnectBtn">DISCONNECT</button>
      <button class="danger" id="stopBtn">STOP</button>
    </div>

    <div class="grid">
      <button class="empty">.</button>
      <button class="primary cmd" data-cmd="FORWARD">VOR</button>
      <button class="empty">.</button>

      <button class="primary cmd" data-cmd="TURN_LEFT_90">LINKS</button>
      <button class="muted cmd" data-cmd="STOP">HALT</button>
      <button class="primary cmd" data-cmd="TURN_RIGHT_90">RECHTS</button>

      <button class="empty">.</button>
      <button class="primary cmd" data-cmd="BACKWARD">ZURÜCK</button>
      <button class="empty">.</button>
    </div>

    <p class="hint">
      Tastatur: W/A/S/D = Vor/Links/Zurück/Rechts, E = Start, Leertaste = Stop, Q = Disconnect.
    </p>
  </div>

  <script>
    // Statusanzeige für Rückmeldungen aus der API.
    const statusEl = document.getElementById('status');

    // Gemeinsamer API-Aufruf für alle Steueraktionen.
    async function call(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {})
      });
      return await res.json();
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function connect() {
      const data = await call('/api/connect');
      setStatus(`Status: ${data.message}`);
    }

    async function disconnect() {
      const data = await call('/api/disconnect');
      setStatus(`Status: ${data.message}`);
    }

    async function sendCommand(command) {
      const data = await call('/api/command', { command });
      setStatus(`Status: ${data.message}`);
    }

    // Primäre Steuer-Buttons (Touch + Maus).
    document.getElementById('connectBtn').addEventListener('click', connect);
    document.getElementById('disconnectBtn').addEventListener('click', disconnect);
    document.getElementById('stopBtn').addEventListener('click', () => sendCommand('STOP'));

    document.querySelectorAll('.cmd').forEach(btn => {
      btn.addEventListener('click', () => sendCommand(btn.dataset.cmd));
    });

    // Tastatur-Mapping für Desktop-Steuerung.
    const keyMap = {
      'w': 'FORWARD',
      'a': 'TURN_LEFT_90',
      's': 'BACKWARD',
      'd': 'TURN_RIGHT_90',
      ' ': 'STOP'
    };

    // Start/Disconnect auf E/Q, Bewegungen auf W/A/S/D + Space.
    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();
      if (key === 'e') {
        event.preventDefault();
        connect();
        return;
      }
      if (key === 'q') {
        event.preventDefault();
        disconnect();
        return;
      }

      const cmd = keyMap[key];
      if (!cmd) return;
      event.preventDefault();
      sendCommand(cmd);
    });
  </script>
</body>
</html>
